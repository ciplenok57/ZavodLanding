<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERSTAK — Конструктор техпроцесса</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #0a2540; overflow: hidden; }

        .app { display: flex; flex-direction: column; height: 100vh; }

        /* Стили для плиток шаблонов */
        .template-section {
            display: flex;
            gap: 16px;
            padding: 12px 16px;
            background: white;
            border-bottom: 1px solid #eef2f6;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .template-card {
            background: #f8fafc;
            border-radius: 20px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid #e2e8f0;
            flex: 1;
            min-width: 200px;
        }
        .template-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            border-color: #0a66c2;
            background: white;
        }
        .template-icon { font-size: 32px; }
        .template-info h4 { font-size: 14px; font-weight: 700; color: #0a2540; }
        .template-info p { font-size: 11px; color: #6c7a91; margin-top: 2px; }
        .template-badge { background: #e0e7ff; color: #0a66c2; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 600; margin-left: auto; }

        .graph-container { flex: 1.5; min-height: 280px; position: relative; border-bottom: 1px solid #eef2f6; }
        .gantt-container { flex: 1.2; background: white; overflow: auto; padding: 16px 20px; border-top: 1px solid #eef2f6; }
        .gantt-table { width: 100%; border-collapse: collapse; font-size: 12px; position: relative; }
        .gantt-table th { text-align: left; padding: 10px 12px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; position: sticky; top: 0; background: white; z-index: 2; }
        .gantt-table td { padding: 8px 12px; border-bottom: 1px solid #edf2f7; vertical-align: middle; position: relative; }
        .gantt-table tr { transition: all 0.2s ease; border-radius: 8px; cursor: pointer; }
        .gantt-table tr:hover td:first-child { background: #fef3c7 !important; }
        .info-bar { padding: 8px 16px; background: #f1f5f9; border-top: 1px solid #eef2f6; font-size: 11px; display: flex; justify-content: space-between; flex-shrink: 0; }
        .badge { background: #e0e7ff; color: #0a66c2; padding: 2px 8px; border-radius: 40px; font-size: 10px; }
        .react-flow { width: 100%; height: 100%; }
        .react-flow__attribution { display: none !important; }

        @keyframes pulse-glow-green {
            0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); }
            100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        @keyframes pulse-border-green {
            0% { border-color: rgba(34, 197, 94, 0.3); }
            50% { border-color: rgba(34, 197, 94, 1); }
            100% { border-color: rgba(34, 197, 94, 0.3); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .active-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            background: #dcfce7;
            color: #16a34a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 600;
            margin-left: 8px;
            animation: pulse-border-green 1.5s ease-in-out infinite;
        }
        .gantt-table tr { animation: fadeInUp 0.3s ease forwards; opacity: 0; }
    </style>

</head>

<script>
    (function() {
        const { React, ReactDOM } = window;

            addEdge,

            applyEdgeChanges,
            Background,
            Controls,
            Handle,

        } = ReactFlowLib;

        const statusConfig = {
            waiting: { icon: '⏸', label: 'Ожидает', color: '#64748b', bg: '#f1f5f9' },
            in_progress: { icon: '▶', label: 'В работе', color: '#22c55e', bg: '#dcfce7' },
            done: { icon: '✅', label: 'Готово', color: '#10b981', bg: '#d1fae5' },
            overdue: { icon: '⚠️', label: 'Просрочено', color: '#dc2626', bg: '#fee2e2' }
        };

        const formatTime = function(seconds) {
            var mins = Math.floor(seconds / 60);
            var secs = seconds % 60;
            return (mins < 10 ? '0' + mins : mins) + ':' + (secs < 10 ? '0' + secs : secs);
        };

        const formatTimeShort = function(seconds) {
            if (seconds >= 60) return Math.floor(seconds / 60) + 'ч ' + (seconds % 60) + 'мин';
            return seconds + 'мин';
        };

        const canStartOperation = function(opId, nodes, edges) {
            var predecessors = edges.filter(function(e) { return e.target === opId; }).map(function(e) { return e.source; });
            if (predecessors.length === 0) return true;
            for (var i = 0; i < predecessors.length; i++) {
                var predId = predecessors[i];
                var predNode = null;
                for (var j = 0; j < nodes.length; j++) {
                    if (nodes[j].id === predId) { predNode = nodes[j]; break; }
                }
                if (!predNode || predNode.data.status !== 'done') return false;
            }
            return true;
        };

        const toggleOperationStatus = function(nodes, setNodes, edges, opId) {
            var targetNode = null;
            for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].id === opId) { targetNode = nodes[i]; break; }
            }
            if (!targetNode) return;

            if (targetNode.data.status === 'in_progress') {
                setNodes(function(prev) {
                    return prev.map(function(node) {
                        if (node.id === opId) {
                            var newData = Object.assign({}, node.data, { status: 'waiting' });
                            return Object.assign({}, node, { data: newData });
                        }
                        return node;
                    });
                });
            } else if (targetNode.data.status === 'waiting') {
                if (canStartOperation(opId, nodes, edges)) {
                    setNodes(function(prev) {
                        return prev.map(function(node) {
                            if (node.id === opId) {
                                var newData = Object.assign({}, node.data, { status: 'in_progress' });
                                return Object.assign({}, node, { data: newData });
                            }
                            return node;
                        });
                    });
                } else {
                    alert('⚠️ Нельзя запустить операцию: сначала завершите все предыдущие операции!');
                }
            } else if (targetNode.data.status === 'in_progress') {
                setNodes(function(prev) {
                    return prev.map(function(node) {
                        if (node.id === opId) {
                            var newData = Object.assign({}, node.data, { status: 'done' });
                            return Object.assign({}, node, { data: newData });
                        }
                        return node;
                    });
                });
            }
        };

        // ========== ШАБЛОН 1: СТОЛ (10 операций) ==========
        const getTableNodes = function() {

                { id: 'a2', type: 'custom', position: { x: 320, y: 30 }, data: { label: '🔪 Кромкование', time: 30, role: 'Кромочник', responsible: 'Дмитрий Смирнов', color: '#10b981', status: 'waiting', priority: '🟠 Средний', equipment: 'Кромкооблицовочный' } },

                { id: 'b1', type: 'custom', position: { x: 320, y: 180 }, data: { label: '🪵 Шлифовка', time: 40, role: 'Шлифовщик', responsible: 'Петр Сидоров', color: '#f97316', status: 'waiting', priority: '🟠 Средний', equipment: 'Шлифовальный' } },

                { id: 'c1', type: 'custom', position: { x: 320, y: 330 }, data: { label: '🔧 Сверловка под фурнитуру', time: 25, role: 'Сверловщик', responsible: 'Сергей Новиков', color: '#f59e0b', status: 'waiting', priority: '🟠 Средний', equipment: 'Сверлильный' } },

                { id: 'packing', type: 'custom', position: { x: 1480, y: 180 }, data: { label: '📦 Упаковка', time: 25, role: 'Упаковщик', responsible: 'Анна Смирнова', color: '#a855f7', status: 'waiting', priority: '⚪ Низкий', equipment: 'Упаковочный стол' } }

        const getTableEdges = function() {
            var opt = { type: 'smoothstep', markerEnd: { type: MarkerType.ArrowClosed, width: 15, height: 15, color: '#94a3b8' }, style: { stroke: '#94a3b8', strokeWidth: 1.5 } };
            return [

                { id: 'e2', source: 'a2', target: 'a3', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e3', source: 'a3', target: 'a4', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },

                { id: 'e5', source: 'b1', target: 'b2', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e6', source: 'b2', target: 'quality', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e7', source: 'c1', target: 'c2', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },

                { id: 'e9', source: 'quality', target: 'packing', type: opt.type, markerEnd: opt.markerEnd, style: opt.style }
            ];
        };

        // ========== ШАБЛОН 2: ШКАФ-КУПЕ (10 операций) ==========
        const getCabinetNodes = function() {
            return [
                { id: 'c1', type: 'custom', position: { x: 30, y: 80 }, data: { label: '📐 Проектирование шкафа', time: 60, role: 'Конструктор', responsible: 'Анна Дизайнер', color: '#8b5cf6', status: 'in_progress', priority: '🔴 Высокий', equipment: 'CAD-система' } },
                { id: 'c2', type: 'custom', position: { x: 320, y: 30 }, data: { label: '📦 Раскрой ЛДСП', time: 45, role: 'Раскройщик', responsible: 'Иван Петров', color: '#3b82f6', status: 'waiting', priority: '🔴 Высокий', equipment: 'CNC-4000' } },
                { id: 'c3', type: 'custom', position: { x: 320, y: 180 }, data: { label: '🖨️ Порезка зеркала', time: 35, role: 'Стекольщик', responsible: 'Максим Соколов', color: '#ec489a', status: 'waiting', priority: '🟠 Средний', equipment: 'Станок для стекла' } },
                { id: 'c4', type: 'custom', position: { x: 610, y: 30 }, data: { label: '🔪 Кромкование ЛДСП', time: 40, role: 'Кромочник', responsible: 'Сергей Козлов', color: '#10b981', status: 'waiting', priority: '🟠 Средний', equipment: 'Кромкооблицовочный' } },
                { id: 'c5', type: 'custom', position: { x: 610, y: 180 }, data: { label: '🪵 Шлифовка торцов', time: 25, role: 'Шлифовщик', responsible: 'Петр Сидоров', color: '#f97316', status: 'waiting', priority: '🟠 Средний', equipment: 'Шлифовальный станок' } },

                { id: 'c8', type: 'custom', position: { x: 1190, y: 30 }, data: { label: '✨ Монтаж зеркала и фасадов', time: 50, role: 'Сборщик', responsible: 'Олег Петров', color: '#14b8a6', status: 'waiting', priority: '🟠 Средний', equipment: 'Монтажный стол' } },
                { id: 'c9', type: 'custom', position: { x: 1190, y: 180 }, data: { label: '✅ Контроль качества', time: 25, role: 'ОТК', responsible: 'Сергей Новиков', color: '#6366f1', status: 'waiting', priority: '🔴 Высокий', equipment: 'Контрольный стол' } },
                { id: 'c10', type: 'custom', position: { x: 1480, y: 110 }, data: { label: '📦 Упаковка и отгрузка', time: 30, role: 'Упаковщик', responsible: 'Анна Смирнова', color: '#a855f7', status: 'waiting', priority: '⚪ Низкий', equipment: 'Упаковочная линия' } }
            ];
        };

        const getCabinetEdges = function() {
            var opt = { type: 'smoothstep', markerEnd: { type: MarkerType.ArrowClosed, width: 15, height: 15, color: '#94a3b8' }, style: { stroke: '#94a3b8', strokeWidth: 1.5 } };
            return [
                { id: 'e1', source: 'c1', target: 'c2', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e2', source: 'c1', target: 'c3', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e3', source: 'c2', target: 'c4', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },

                { id: 'e5', source: 'c4', target: 'c6', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e6', source: 'c5', target: 'c7', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e7', source: 'c6', target: 'c7', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },
                { id: 'e8', source: 'c7', target: 'c8', type: opt.type, markerEnd: opt.markerEnd, style: opt.style },

        // ========== ШАБЛОН 3: КВАНТОВЫЙ ТЕЛЕПОРТ (10 операций) ==========
        const getTeleportNodes = function() {
            return [
                { id: 't1', type: 'custom', position: { x: 30, y: 80 }, data: { label: '🔬 Калибровка квантового чипа', time: 60, role: 'Квантовый инженер', responsible: 'Доктор Эми Смит', color: '#8b5cf6', status: 'in_progress', priority: '🔴 Высокий', equipment: 'Квантовый компьютер' } },
                { id: 't2', type: 'custom', position: { x: 320, y: 30 }, data: { label: '🌀 Создание ЭПР-пары', time: 45, role: 'Физик', responsible: 'Профессор Джонс', color: '#ec489a', status: 'waiting', priority: '🔴 Высокий', equipment: 'Лазерный интерферометр' } },
                { id: 't3', type: 'custom', position: { x: 320, y: 180 }, data: { label: '⚡ Запуск генератора частиц', time: 35, role: 'Оператор', responsible: 'Елена Волкова', color: '#f59e0b', status: 'waiting', priority: '🟠 Средний', equipment: 'Генератор' } },
                { id: 't4', type: 'custom', position: { x: 610, y: 30 }, data: { label: '📡 Настройка телепортационной матрицы', time: 70, role: 'Инженер', responsible: 'Виктор Ли', color: '#14b8a6', status: 'waiting', priority: '🔴 Высокий', equipment: 'Матричный процессор' } },
                { id: 't5', type: 'custom', position: { x: 610, y: 180 }, data: { label: '🔭 Сканирование объекта', time: 40, role: 'Наблюдатель', responsible: 'Алексей Соколов', color: '#3b82f6', status: 'waiting', priority: '🟠 Средний', equipment: '3D-сканер' } },

            return [

            ];
        };

        const CustomNode = function(props) {
            var id = props.id;
            var data = props.data;
            var selected = props.selected;
            var nodes = props.nodes;
            var edges = props.edges;
            var setNodes = props.setNodes;
            var handleToggleStatus = props.handleToggleStatus;

            var status = statusConfig[data.status] || statusConfig.waiting;
            var canStart = (data.status === 'waiting') ? canStartOperation(id, nodes, edges) : false;

            var onDelete = function(e) {
                e.stopPropagation();
                if (data.onDelete) data.onDelete(id);
            };

            var onToggle = function(e) {
                e.stopPropagation();
                if (handleToggleStatus) handleToggleStatus(id);
            };

            var actionButton = null;
            if (data.status === 'waiting') {
                actionButton = React.createElement('button', {
                    onClick: onToggle,
                    style: { background: canStart ? '#22c55e' : '#94a3b8', border: 'none', borderRadius: '12px', padding: '2px 6px', fontSize: '8px', cursor: canStart ? 'pointer' : 'not-allowed', color: 'white' }
